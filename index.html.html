<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entregas totolan</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      margin: 0;
      background: linear-gradient(135deg, #1abc9c, #2c3e50);
      color: #333;
    }

    header {
      text-align: center;
      padding: 25px;
      color: white;
    }

    h1 { margin: 0; }

    .container {
      max-width: 500px;
      margin: auto;
      padding: 20px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      margin-bottom: 20px;
    }

    input, textarea {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 10px;
      border: 1px solid #ccc;
      font-size: 14px;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 15px;
      border-radius: 10px;
      border: none;
      background: #27ae60;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #219150;
    }

    .whatsapp {
      background: #25D366;
    }

    .whatsapp:hover {
      background: #1ebe5d;
    }

    .badge {
      background: #e74c3c;
      color: white;
      padding: 5px 10px;
      border-radius: 20px;
      font-size: 12px;
    }
  </style>
</head>
<body>

<header>
  <h1>🚚 Entregas totolan</h1>
  <p>Pedidos rápidos por WhatsApp</p>
</header>

<div class="container">

  <div class="card">
    <h2>📦 Solicitar entrega</h2>

    <input type="text" id="nombre" placeholder="Tu nombre">
    <input type="text" id="telefono" placeholder="Tu teléfono">
    <input type="text" id="direccion" placeholder="Dirección">
    <textarea id="pedido" placeholder="¿Qué necesitas?" rows="3"></textarea>

    <button onclick="guardarPedido()">💾 Guardar pedido</button>
    <button class="whatsapp" onclick="enviarWhatsApp()">📲 Enviar por WhatsApp</button>
  </div>

  <div class="card">
    <h2>📋 Pedidos <span class="badge" id="contador">0</span></h2>
    <ul id="listaPedidos"></ul>
  </div>

</div>

<script>
  let pedidos = JSON.parse(localStorage.getItem('pedidos')) || [];

  function actualizarLista() {
    const lista = document.getElementById('listaPedidos');
    const contador = document.getElementById('contador');
    lista.innerHTML = '';

    pedidos.forEach(p => {
      const item = document.createElement('li');
      item.textContent = `${p.nombre} - ${p.direccion} - ${p.pedido}`;
      lista.appendChild(item);
    });

    contador.textContent = pedidos.length;
  }

  function guardarPedido() {
    const nombre = document.getElementById('nombre').value;
    const telefono = document.getElementById('telefono').value;
    const direccion = document.getElementById('direccion').value;
    const pedido = document.getElementById('pedido').value;

    if (!nombre || !telefono || !direccion || !pedido) {
      alert('Completa todos los campos');
      return;
    }

    const nuevo = { nombre, telefono, direccion, pedido };
    pedidos.push(nuevo);

    localStorage.setItem('pedidos', JSON.stringify(pedidos));

    actualizarLista();
    limpiar();
  }

  function enviarWhatsApp() {
    const nombre = document.getElementById('nombre').value;
    const telefono = document.getElementById('telefono').value;
    const direccion = document.getElementById('direccion').value;
    const pedido = document.getElementById('pedido').value;

    if (!nombre || !telefono || !direccion || !pedido) {
      alert('Completa todos los campos');
      return;
    }

    const mensaje = `Hola, quiero hacer un pedido:%0A%0A👤 Nombre: ${nombre}%0A📞 Tel: ${telefono}%0A📍 Dirección: ${direccion}%0A📦 Pedido: ${pedido}`;

    const numero = "5213349594507"; //

    window.open(`https://wa.me/${numero}?text=${mensaje}`, '_blank');
  }

  function limpiar() {
    document.getElementById('nombre').value = '';
    document.getElementById('telefono').value = '';
    document.getElementById('direccion').value = '';
    document.getElementById('pedido').value = '';
  }

  actualizarLista();
</script>

</body>
</html>
